<!DOCTYPE html>
<html lang="ja">
<head><meta charset="UTF-8"><title>社員詳細</title></head>
<body>
  <h1>社員詳細</h1>
  <table border="1">
    <tr><th>氏名</th>    <td>{{ employee.name }}</td></tr>
    <tr><th>部署</th>    <td>{{ employee.dept }}</td></tr>
    <tr><th>役職</th>    <td>{{ employee.role }}</td></tr>
    <tr><th>メール</th>  <td>{{ employee.email }}</td></tr>
    <tr><th>入社日</th>  <td>{{ employee.joined_date }}</td></tr>
  </table>
  <a href="{% url 'staff:list' %}">← 一覧に戻る</a>
</body>
</html>
