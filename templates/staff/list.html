<!DOCTYPE html>
<html lang="ja">
<head><meta charset="UTF-8"><title>社員一覧</title></head>
<body>
  <h1>社員一覧</h1>
  <a href="{% url 'staff:new' %}">＋新規社員登録</a>
  <table border="1">
    <tr>
      <th>氏名</th><th>部署</th><th>役職</th><th>入社日</th>
    </tr>
    {% for emp in employees %}
    <tr>
      <td><a href="{% url 'staff:detail' emp.id %}">{{ emp.name }}</a></td>
      <td>{{ emp.dept }}</td>
      <td>{{ emp.role }}</td>
      <td>{{ emp.joined_date }}</td>
      <td>
        <a href="{% url 'staff:edit' emp.id %}">編集する</a>
        <a href="{% url 'staff:delete' emp.id %}">削除する</a>
      </td>
    </tr>
    {% endfor %}
  </table>
</body>
</html>
